name: New category
description: Propose a new category for the list.
title: "New category: [category-name]"
labels: ["new-category"]
body:
  - type: markdown
    attributes:
      value: |
        New categories are only added when there are at least 3 maintained entries to populate them.
        Please provide all 3 entries below.

  - type: input
    id: name
    attributes:
      label: Category name
      placeholder: "e.g. Database APIs"
    validations:
      required: true

  - type: textarea
    id: rationale
    attributes:
      label: Why does this category deserve its own section?
      description: Explain why these wrappers don't fit existing categories.
    validations:
      required: true

  - type: textarea
    id: entries
    attributes:
      label: Initial entries (minimum 3)
      description: One table row per entry in the standard format.
      placeholder: |
        | repo-one | API name | TypeScript | Official | [npm](https://www.npmjs.com/package/example-one) | [GitHub](https://github.com/owner/repo-one) | Short factual note. |
        | repo-two | API name | Python | Community | [PyPI](https://pypi.org/project/example-two/) | [GitHub](https://github.com/owner/repo-two) | Short factual note. |
        | repo-three | API name | Go | Community | [pkg.go.dev](https://pkg.go.dev/github.com/owner/repo-three) | [GitHub](https://github.com/owner/repo-three) | Short factual note. |
    validations:
      required: true
