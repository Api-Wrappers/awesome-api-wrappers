name: Welcome first-time contributors

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Welcome first-time PR contributor
        if: github.event_name == 'pull_request_target'
        uses: actions/github-script@v9
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 100,
            });
            const authorPRs = prs.filter(
              pr => pr.user.login === context.payload.pull_request.user.login
            );
            if (authorPRs.length === 1) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `👋 Thanks for your first contribution to **Awesome API Wrappers**, @${context.payload.pull_request.user.login}!\n\nA maintainer will review your submission shortly. In the meantime, double-check that your entry:\n- Follows the [entry format](https://github.com/Api-Wrappers/awesome-api-wrappers/blob/main/CONTRIBUTING.md#entry-format)\n- Links to both a package page and a GitHub repository\n- Is placed alphabetically within the correct category\n- Has a short factual note with no marketing language\n\nWe appreciate you helping make this list better! 🙌`,
              });
            }

      - name: Welcome first-time issue author
        if: github.event_name == 'issues'
        uses: actions/github-script@v9
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              creator: context.payload.issue.user.login,
              per_page: 100,
            });
            if (issues.length === 1) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: `👋 Thanks for opening your first issue, @${context.payload.issue.user.login}! A maintainer will take a look soon.`,
              });
            }
